version: "3.9"

networks:
  app-net:
    driver: bridge

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: effective-mobile-backend
    restart: unless-stopped
    networks:
      - app-net
    # Port NOT exposed to host — accessible only inside app-net
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:1.27-alpine
    container_name: effective-mobile-nginx
    restart: unless-stopped
    networks:
      - app-net
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
